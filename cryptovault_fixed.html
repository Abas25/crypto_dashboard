<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoVault</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05050f;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --green:#00ff88;--red:#ff4466;--purple:#8b5cf6;--cyan:#00d4ff;
  --text:#e2e8f0;--muted:#64748b;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px}
.tr-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shim 1.5s infinite;border-radius:8px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

<body>

<div class="card">
  <h2>Top Gainers (Loading State Example)</h2>

  <div class="tr-list" id="trl">
    <div class="skel" style="height:46px;border-radius:10px"></div>
    <div class="skel" style="height:46px;border-radius:10px"></div>
    <div class="skel" style="height:46px;border-radius:10px"></div>
    <div class="skel" style="height:46px;border-radius:10px"></div>
    <div class="skel" style="height:46px;border-radius:10px"></div>
    <div class="skel" style="height:46px;border-radius:10px"></div>
    <div class="skel" style="height:46px;border-radius:10px"></div>
  </div>

</div>

</body>
</html>
